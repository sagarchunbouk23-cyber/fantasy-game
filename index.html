<!DOCTYPE html>
<html>
<head>
<title>Fantasy World</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #000; }
#canvas { width: 100vw; height: 100vh; }
#ui { position: fixed; top: 10px; left: 10px; color: white; font-family: Arial; }
#joystick { position: fixed; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; }
#nameInput { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: center; color: white; }
#nameInput input { padding: 10px; margin: 10px; border-radius: 5px; border: none; }
#nameInput button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<div id="nameInput">
<h2>⚔️ Fantasy World</h2>
<p>Enter your name:</p>
<input type="text" id="playerName" placeholder="Your name...">
<br>
<button onclick="startGame()">Enter World</button>
</div>
<canvas id="canvas"></canvas>
<div id="ui">
<div id="players">Players: 0</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, player, ws;
let players = {}, myId = null;
let keys = {};

function startGame() {
  const name = document.getElementById('playerName').value || 'Hero';
  document.getElementById('nameInput').style.display = 'none';
  initGame(name);
}

function initGame(name) {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({canvas: document.getElementById('canvas')});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;

  // Lighting
  const sun = new THREE.DirectionalLight(0xffffff, 1);
  sun.position.set(50, 100, 50);
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x404040));

  // Ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshLambertMaterial({color: 0x228B22})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // Mountains
  for(let i = 0; i < 20; i++) {
    const mountain = new THREE.Mesh(
      new THREE.ConeGeometry(Math.random()*15+5, Math.random()*30+20, 8),
      new THREE.MeshLambertMaterial({color: 0x696969})
    );
    mountain.position.set(Math.random()*300-150, 15, Math.random()*300-150);
    scene.add(mountain);
  }

  // Trees
  for(let i = 0; i < 50; i++) {
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.5, 0.5, 5),
      new THREE.MeshLambertMaterial({color: 0x8B4513})
    );
    trunk.position.set(Math.random()*200-100, 2.5, Math.random()*200-100);
    scene.add(trunk);
    const leaves = new THREE.Mesh(
      new THREE.ConeGeometry(3, 8, 8),
      new THREE.MeshLambertMaterial({color: 0x228B22})
    );
    leaves.position.set(trunk.position.x, 9, trunk.position.z);
    scene.add(leaves);
  }

  // Volcano
  const volcano = new THREE.Mesh(
    new THREE.ConeGeometry(20, 40, 8),
    new THREE.MeshLambertMaterial({color: 0x4a4a4a})
  );
  volcano.position.set(100, 20, 100);
  scene.add(volcano);
  const lava = new THREE.Mesh(
    new THREE.CylinderGeometry(5, 5, 2),
    new THREE.MeshLambertMaterial({color: 0xff4500})
  );
  lava.position.set(100, 41, 100);
  scene.add(lava);

  // Player
  player = new THREE.Mesh(
    new THREE.BoxGeometry(1, 2, 1),
    new THREE.MeshLambertMaterial({color: 0x0000ff})
  );
  player.position.set(0, 1, 0);
  scene.add(player);
  camera.position.set(0, 5, 10);

  // WebSocket
  const wsUrl = window.location.hostname === 'localhost' 
    ? 'ws://localhost:3000'
    : 'wss://' + window.location.hostname;
  ws = new WebSocket(wsUrl);
  
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'init') {
      myId = data.id;
      ws.send(JSON.stringify({type: 'name', name}));
    }
    if(data.type === 'update') {
      updatePlayers(data.players);
    }
  };

  document.addEventListener('keydown', e => keys[e.key] = true);
  document.addEventListener('keyup', e => keys[e.key] = false);
  animate();
}

function updatePlayers(data) {
  document.getElementById('players').textContent = 'Players: ' + Object.keys(data).length;
  Object.keys(data).forEach(id => {
    if(id === myId) return;
    if(!players[id]) {
      players[id] = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshLambertMaterial({color: 0xff0000})
      );
      scene.add(players[id]);
    }
    players[id].position.set(data[id].x, data[id].y, data[id].z);
  });
}

function animate() {
  requestAnimationFrame(animate);
  const speed = 0.2;
  if(keys['ArrowUp'] || keys['w']) { player.position.z -= speed; }
  if(keys['ArrowDown'] || keys['s']) { player.position.z += speed; }
  if(keys['ArrowLeft'] || keys['a']) { player.position.x -= speed; }
  if(keys['ArrowRight'] || keys['d']) { player.position.x += speed; }

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;
  camera.lookAt(player.position);

  if(ws && ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: 'move',
      x: player.position.x,
      y: player.position.y,
      z: player.position.z
    }));
  }
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
  </html>
